# ===========================================================================
# Generic GitHub Actions workflow to build a wodoc site and publish it to the
# gh-pages branch. Copy this to .github/workflows/doc.yml in your project and
# adjust the marked lines.
#
#   - push to main  -> rebuild and deploy the "dev" docs (dev/).
#   - manual run    -> build any version (e.g. a release tag) and optionally
#                      repoint "latest" at it.
#
# Each run replaces only its own <label>/ directory; the other version
# directories already on gh-pages are preserved.
#
# The starter config ships its theme with RELATIVE (css …) paths, so wodoc copies
# it into each build and the site is self-contained — it works at any deploy path,
# including a plain GitHub project page (you.github.io/PROJECT/). (If you switch to
# the absolute Ocsigen default for the stylesheet, you must instead serve /css/ at
# the domain root.) See examples/starter/README.md.
# ===========================================================================
name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      label:
        description: "Version label / output directory (e.g. dev, 1.0.0)"
        required: true
        default: dev
      ref:
        description: "Git ref to build (branch or tag). Defaults to the label."
        required: false
        default: ""
      set_latest:
        description: "Also repoint 'latest' at this build"
        type: boolean
        default: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LABEL: ${{ github.event.inputs.label || 'dev' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.inputs.label || github.sha }}
          fetch-depth: 0

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5"

      - name: Install dependencies, odoc and wodoc
        run: |
          opam install . --deps-only --with-doc
          opam install odoc
          # Until wodoc is on the opam repository, pin it from git:
          opam pin add -y wodoc git+https://github.com/ocsigen/wodoc.git
          # (once released:  opam install wodoc )

      - name: Build the documentation site
        run: |
          opam exec -- wodoc build \
            --config doc/wodoc --out "_site/$LABEL" --label "$LABEL"
          # (uses wodoc's built-in theme + top bar; add --menu doc/menu.html and a
          #  (css …) stanza to use the custom examples shipped in this starter)

      # Deploy only this version's directory; clean is scoped to target-folder, so
      # the other version directories already on gh-pages are preserved.
      - name: Deploy this version
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site/${{ env.LABEL }}
          target-folder: ${{ env.LABEL }}
          clean: true

      # GitHub Pages must NOT run Jekyll: the Markdown twins can contain content
      # (e.g. {%…%}) that Jekyll's Liquid parser rejects. A .nojekyll at the site
      # root disables it. (clean above is scoped to <label>/, so this persists.)
      - name: Disable Jekyll (.nojekyll at the site root)
        run: mkdir -p _ghroot && touch _ghroot/.nojekyll
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _ghroot
          target-folder: .
          clean: false

      - name: Repoint 'latest' (releases only)
        if: ${{ github.event.inputs.set_latest == 'true' }}
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "$tmp"
          ln -sfn "$LABEL" "$tmp/latest"
          git -C "$tmp" add latest
          git -C "$tmp" -c user.email=ci@example.com -c user.name="Docs CI" \
            commit -m "doc: latest -> $LABEL" || true
          git -C "$tmp" push
